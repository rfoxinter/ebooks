<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Bib/i | Bibliothèque</title>
        <script type="text/javascript">
            function openBook() {
            	repuser=document.login.user.value;
            	window.open("./i/?book="+repuser, "_self");
            }
        </script>
    <body>
        <div>
            <h1>Entrez le nom du livre ici</h1>
            <form name="login" id="login">
                <p>Nom du livre</p>
                <input type="text" name="user" id="user" placeholder="Entez le titre du livre">
                <input type="submit" value="Trouver le livre" onclick="openBook()" />
            </form>
        </div>
        <br>
        <div>
        	<h1>Bibliothèque</h1>
            <ul>
            	<li>The Catcher in the Rye
            	</li>
            </ul>
        </div>
</body>
</head>
</html>
