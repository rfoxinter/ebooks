<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Bib/i | Bibliothèque</title>
        <script type="text/javascript">
            function openBook() {
            	repuser=document.bookshelf.book.value;
            	window.open("https://rfoxinter.github.io/ebooks/i/?book="+repuser, "_self");
            }
        </script>
    <body>
        <div>
            <h1>Entrez le nom du livre ici</h1>
            <form name="bookshelf" id="bookshelf">
                <p>Nom du livre</p>
                <input type="text" name="book" id="book" placeholder="Entez le titre du livre">
                <input type="button" value="Trouver le livre" onclick="openBook()" />
            </form>
        </div>
        <br>
        <div>
        	<h1>Bibliothèque</h1>
            <ul>
            	<li>The Catcher in the Rye</li>
            </ul>
        </div>
</body>
</head>
</html>
